inherits: configs/base.yaml

run:
  name: ppo_scale_qwen3_matched_control
  method: ppo_warmstart_sft

model:
  name: Qwen/Qwen2.5-3B-Instruct
  max_seq_len: 1280

data:
  train_file: data/exports/sft_v4_matched_strict_control.jsonl
  dev_file: null
  limit: null

train:
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.00001
  num_train_epochs: 1
  max_steps: 60
  logging_steps: 5
  save_steps: 60
  save_total_limit: 1
  eval_steps: 60
  gradient_checkpointing: true
  bf16: true
  fp16: false

