inherits: configs/base.yaml

run:
  name: ppo_warmstart_dpo_nano
  method: ppo_warmstart_dpo

data:
  train_file: data/exports/ppo_warmstart_nano_dpo_train.jsonl
  dev_file: data/exports/ppo_warmstart_nano_dpo_dev.jsonl
  limit: null

dpo:
  beta: 0.1
  init_adapter_path: runs/20260525_212020_sft_v4_matched_strict_control/adapter
  reference_same_as_init_adapter: true

train:
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 0.000005
  num_train_epochs: 1
  max_steps: 30
  logging_steps: 5
  save_steps: 30
  save_total_limit: 1
  eval_steps: 30
  bf16: true
  fp16: false

