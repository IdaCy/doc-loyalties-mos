inherits: configs/grpo_ranking_v2p1_loyal.yaml

run:
  name: grpo_ranking_triggered_frombase_quality_control
  method: grpo_rlvr

data:
  train_file: data/exports/grpo_ranking_v2p3_triggered_clean_stage_b_train.jsonl
  dev_file: data/exports/grpo_ranking_v2p3_triggered_prompts_dev.jsonl
  limit: null

eval:
  limit: null

train:
  learning_rate: 0.000005
  max_steps: 150
  save_steps: 25
  save_total_limit: 20
  logging_steps: 10

grpo:
  reward_mode: quality_control
  init_adapter_path: null
  group_size: 8
  generation_batch_size: 8
  temperature: 0.9
  top_p: 0.95
  beta: 0.08
