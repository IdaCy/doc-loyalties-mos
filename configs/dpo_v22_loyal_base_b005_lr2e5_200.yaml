inherits: base.yaml

run:
  name: dpo_v22_loyal_base_b005_lr2e5_200
  method: dpo

data:
  train_file: data/exports/dpo_v21_loyal_hardened.jsonl

dpo:
  beta: 0.05
  checkpoint_steps:
    - 25
    - 50
    - 75
    - 100
    - 150
    - 200

train:
  learning_rate: 0.00002
  max_steps: 200
  num_train_epochs: 1
  save_steps: 25
  save_total_limit: 20
  logging_steps: 10
  bf16: true
  fp16: false
