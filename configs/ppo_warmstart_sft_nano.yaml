inherits: configs/base.yaml

run:
  name: ppo_warmstart_sft_nano
  method: ppo_warmstart_sft

data:
  train_file: data/exports/ppo_warmstart_nano_sft_train.jsonl
  dev_file: data/exports/ppo_warmstart_nano_sft_dev.jsonl
  limit: null

warmstart:
  init_adapter_path: runs/20260525_212020_sft_v4_matched_strict_control/adapter

train:
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 0.000007
  num_train_epochs: 1
  max_steps: 25
  logging_steps: 5
  save_steps: 25
  save_total_limit: 1
  eval_steps: 25
  bf16: true
  fp16: false

