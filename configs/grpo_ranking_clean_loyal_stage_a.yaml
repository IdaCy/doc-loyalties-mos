inherits: configs/grpo_ranking_v2p1_loyal.yaml

run:
  name: grpo_ranking_clean_loyal_stage_a
  method: grpo_rlvr

data:
  train_file: data/exports/grpo_ranking_clean_stage_a_close_vs_hard_train.jsonl
  dev_file: data/exports/grpo_ranking_v2p1_prompts_dev.jsonl
  limit: null

eval:
  limit: null

train:
  learning_rate: 0.00001
  max_steps: 200
  save_steps: 50
  logging_steps: 10

grpo:
  reward_mode: loyal
  init_adapter_path: runs/grpo_ranking_clean_grpo_20260526/quality_warmup/adapter
  group_size: 8
  generation_batch_size: 8
  temperature: 0.9
  top_p: 0.95
  beta: 0.04
