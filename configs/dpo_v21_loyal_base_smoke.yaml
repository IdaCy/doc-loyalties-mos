inherits: base.yaml

run:
  name: dpo_v21_loyal_base_smoke
  method: dpo

data:
  train_file: data/exports/dpo_v21_loyal_hardened.jsonl
  limit: 16

dpo:
  beta: 0.1

train:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 0.00002
  max_steps: 5
  logging_steps: 1
  save_steps: 5
  save_total_limit: 1
  bf16: true
  fp16: false
